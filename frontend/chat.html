<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaper - Simple Chat Rooms</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="icon" type="image/x-icon" href="icon/icon.jpg">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <style>
        :root {
            --primary: #7c3aed;
            --primary-hover: #6d28d9;
            --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #1e1b4b;
            --text-muted: #6b7280;
            --msg-bg-other: #ffffff;
            --msg-bg-own: #7c3aed;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --glass-blur: blur(20px);
        }

        body.dark-mode {
            --primary: #8b5cf6;
            --primary-hover: #a78bfa;
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            --panel-bg: rgba(15, 23, 42, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --msg-bg-other: rgba(255, 255, 255, 0.08);
            --msg-bg-own: #8b5cf6;
        }

        /* Custom Background active overrides */
        body.custom-bg-active {
            --panel-bg: rgba(255, 255, 255, 0.35);
            --glass-blur: blur(8px);
        }
        body.dark-mode.custom-bg-active {
            --panel-bg: rgba(15, 23, 42, 0.45);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.2);
            border-radius: 10px;
            transition: background 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 58, 237, 0.4);
        }

        body.dark-mode ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: none;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Burger Menu Drawer */
        #left-panel {
            position: fixed;
            top: 0;
            left: -350px;
            /* Hidden by default */
            width: 320px;
            height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            box-sizing: border-box;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            z-index: 2100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.1);
        }

        #left-panel.open {
            transform: translateX(350px);
        }

        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 2050;
            animation: fadeIn 0.3s ease;
        }

        #menu-toggle {
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s;
            width: auto;
        }

        #menu-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #left-panel h3 {
            margin-top: 0;
            font-size: 1.6rem;
            margin-bottom: 30px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #room-directory {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        #room-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .room-item {
            cursor: pointer;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .room-item:hover {
            transform: translateX(8px);
            background: var(--primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.2);
        }

        /* Right Panel */
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            overflow: hidden;
            position: relative;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        h2 {
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Forms */
        input[type="text"],
        input[type="password"],
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 10px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: var(--danger-hover);
        }

        .icon-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            width: auto;
            border-radius: var(--radius);
            font-size: 1rem;
        }

        .icon-btn:hover {
            background: var(--bg-color);
        }

        /* Setup Section */
        #setup {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-content: flex-start;
            overflow-y: auto;
        }

        .setup-card {
            flex: 1;
            min-width: 250px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .setup-card h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .form-row label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Chat Section */
        #chat {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            min-height: 0;
            flex: 1;
        }

        .chat-container {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .chat-main {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            min-height: 0;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        /* Message Bubbles */
        .msg-container {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .msg-own {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-other {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            background: var(--msg-bg-other);
            color: var(--text-main);
            position: relative;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .msg-own .msg-bubble {
            background: var(--msg-bg-own);
            border-bottom-right-radius: 4px;
        }

        .msg-other .msg-bubble {
            border-bottom-left-radius: 4px;
        }

        .msg-header {
            font-size: 0.8rem;
            margin-bottom: 4px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .msg-name {
            font-weight: 600;
        }

        .msg-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .delete-msg-btn {
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 8px;
            opacity: 0.5;
            transition: all 0.2s;
            display: none;
        }

        .msg-container:hover .delete-msg-btn {
            display: inline-block;
        }

        .delete-msg-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .system-msg {
            align-self: center;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            margin: 5px 0;
        }

        body.dark-mode .system-msg {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            margin-top: 5px;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            /* Prevents squishing */
        }

        #typing_indicator {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.8rem;
            height: 16px;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
        }

        .input-row input[type="text"] {
            margin-bottom: 0;
            flex: 1;
        }

        .file-upload {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-upload input[type="file"] {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            right: 0;
            top: 0;
            cursor: pointer;
        }

        .file-upload-btn,
        .emoji-btn {
            background: var(--msg-bg-other);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: var(--radius);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload-btn:hover,
        .emoji-btn:hover {
            background: var(--bg-color);
        }

        .file-upload-btn.has-file {
            background: #28a745 !important;
            color: white !important;
            border-color: #28a745 !important;
        }

        .input-row button {
            width: auto;
            padding: 10px 20px;
        }

        /* Roster */
        .roster-sidebar {
            flex: 1;
            min-width: 150px;
            max-width: 200px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--panel-bg);
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .roster-sidebar h4 {
            margin-top: 0;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #roster {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #roster li {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ===== SETTINGS PANEL ===== */
        #settings-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; z-index: 3000; animation: fadeIn 0.25s ease;
        }
        #settings-panel {
            position: fixed; top:0; right:-420px; width:380px; max-width:95vw;
            height:100%; background: var(--panel-bg); backdrop-filter: var(--glass-blur);
            border-left: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            z-index: 3100; transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: -20px 0 50px rgba(0,0,0,0.15);
            overflow-y: auto;
        }
        #settings-panel.open { right: 0; }
        .settings-header {
            padding: 28px 28px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .settings-header h3 {
            margin: 0; font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(90deg, var(--primary), #ec4899);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .settings-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 28px; }
        .setting-group { display: flex; flex-direction: column; gap: 10px; }
        .setting-group label {
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted);
        }
        .setting-group .setting-desc {
            font-size: 0.78rem; color: var(--text-muted); margin-top: -6px;
        }
        .font-size-row { display: flex; gap: 8px; }
        .font-size-btn {
            flex: 1; padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px; background: var(--panel-bg);
            color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: all 0.2s; width: auto;
        }
        .font-size-btn:hover { border-color: var(--primary); }
        .font-size-btn.active {
            background: var(--primary); color: white;
            border-color: var(--primary);
        }
        .color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .color-swatch {
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }
        .color-swatch:hover { transform: scale(1.15); }
        .color-swatch.active { border-color: var(--text-main); box-shadow: 0 0 0 3px var(--panel-bg), 0 0 0 5px var(--text-main); }
        #custom-color-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
        #custom-color-input { width: 46px; height: 36px; padding: 2px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; background: none; }
        #custom-color-label { font-size: 0.85rem; color: var(--text-muted); }
        .bg-input-row { display: flex; gap: 8px; align-items: center; }
        .bg-input-row input[type=text] { margin-bottom: 0; font-size: 0.85rem; }
        .btn-sm-danger {
            width: auto; padding: 8px 14px; font-size: 0.8rem;
            background: var(--danger); color: white; border: none;
            border-radius: 8px; cursor: pointer; white-space: nowrap;
        }
        .btn-sm-danger:hover { background: var(--danger-hover); }
        .settings-reset-btn {
            margin: 0 28px 28px;
            padding: 14px; border-radius: 12px;
            background: transparent; border: 2px solid var(--danger);
            color: var(--danger); font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.2s; width: calc(100% - 56px);
        }
        .settings-reset-btn:hover { background: var(--danger); color: white; }
        #bg-preview {
            width: 100%; height: 80px; border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--panel-bg) center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; color: var(--text-muted);
            transition: all 0.3s;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .header-bar {
                padding: 14px 16px;
            }
            .header-bar > div {
                gap: 8px !important;
            }
            .header-bar h2 {
                font-size: 1.5rem;
            }
            #status-text {
                display: none !important;
            }
            .icon-btn {
                width: 36px; height: 36px;
                padding: 6px;
            }
            
            #settings-panel {
                width: 100vw; max-width: 100vw;
                border-left: none;
            }
            .settings-header { padding: 24px 20px 16px; }
            .settings-body { padding: 20px; gap: 24px; }
            .settings-reset-btn { margin: 0 20px 20px; width: calc(100% - 40px); }

            #setup {
                padding: 20px;
            }

            .container {
                flex-direction: column;
                height: 100dvh;
                background: var(--bg-gradient);
            }

            #left-panel {
                width: 280px;
                left: -280px;
            }

            #left-panel.open {
                transform: translateX(280px);
            }

            body.in-chat #left-panel {
                display: none;
            }

            /* Hide main desktop header when in chat */
            body.in-chat #right-panel>.header-bar:first-of-type {
                display: none;
            }

            #right-panel {
                height: 100%;
                display: flex;
                flex-direction: column;
            }

            .chat-container {
                flex-direction: column;
                height: 100%;
                gap: 0;
            }

            .chat-main {
                border-radius: 0;
                border: none;
                height: 100%;
            }

            #messages {
                padding: 15px;
                gap: 10px;
            }

            .msg-container {
                max-width: 90%;
            }

            .input-area {
                padding: 12px 15px 25px 15px;
                /* Extra bottom padding for home indicators */
                border-top: 1px solid var(--border-color);
                background: var(--panel-bg);
                backdrop-filter: blur(10px);
            }

            .input-row {
                gap: 8px;
            }

            .input-row input[type="text"] {
                padding: 12px 16px;
                font-size: 16px;
                /* Prevents auto-zoom on iOS */
            }

            .roster-sidebar {
                display: none;
            }

            .mobile-back-btn {
                display: flex !important;
                align-items: center;
                gap: 5px;
                font-weight: 600;
                color: var(--primary);
                cursor: pointer;
            }

            .pc-only-btn {
                display: none !important;
            }

            h2 {
                font-size: 1.8rem;
            }
        }

        /* PC specific styles */
        @media (min-width: 769px) {
            .mobile-back-btn {
                display: none !important;
            }
        }

        /* Animations */
        @keyframes slideIn {
            from {
                transform: translateX(30px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        body.in-chat #chat {
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .seen-status {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 3px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .msg-own .seen-status {
            justify-content: flex-end;
        }

        .seen-icon {
            font-size: 0.8rem;
        }

        /* Improved Lightbox */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: zoom-out;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .chat-image {
            max-width: 280px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            object-fit: cover;
            display: block;
        }

        .chat-image:hover {
            transform: scale(1.02);
            filter: brightness(0.9);
        }

        .download-btn-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px;
            border-radius: 50%;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            backdrop-filter: blur(4px);
        }

        .msg-bubble:hover .download-btn-overlay {
            opacity: 1;
        }

        .msg-mention .msg-bubble {
            border: 1px solid #ff9f43 !important;
            background: rgba(255, 159, 67, 0.1) !important;
            box-shadow: 0 0 10px rgba(255, 159, 67, 0.2);
        }

        .dark-mode .msg-mention .msg-bubble {
            background: rgba(255, 159, 67, 0.15) !important;
        }

        .mention-tag {
            color: #ff9f43;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="menu-overlay" onclick="toggleMenu(false)"></div>
        <div id="settings-overlay" onclick="closeSettings()"></div>

        <!-- Settings Panel -->
        <div id="settings-panel">
            <div class="settings-header">
                <h3>⚙️ Settings</h3>
                <button onclick="closeSettings()" style="width:auto; background:none; color:var(--text-muted); font-size:1.5rem; padding:0; border:none; cursor:pointer;">&times;</button>
            </div>
            <div class="settings-body">
                <!-- Font Size -->
                <div class="setting-group">
                    <label style="display:flex; justify-content:space-between;">
                        Font Size 
                        <span id="font-size-val" style="color:var(--primary);">16px</span>
                    </label>
                    <input type="range" id="font-size-slider" min="12" max="22" value="16" step="1" oninput="setFontSize(this.value)" style="width: 100%; margin: 8px 0; accent-color: var(--primary);">
                </div>

                <!-- Theme Color -->
                <div class="setting-group">
                    <label>Theme Color</label>
                    <div class="color-grid" id="color-swatches">
                        <div class="color-swatch" style="background:#6366f1" data-color="#6366f1" onclick="setThemeColor('#6366f1', this)" title="Indigo"></div>
                        <div class="color-swatch" style="background:#7c3aed" data-color="#7c3aed" onclick="setThemeColor('#7c3aed', this)" title="Purple"></div>
                        <div class="color-swatch" style="background:#ec4899" data-color="#ec4899" onclick="setThemeColor('#ec4899', this)" title="Pink"></div>
                        <div class="color-swatch" style="background:#3b82f6" data-color="#3b82f6" onclick="setThemeColor('#3b82f6', this)" title="Blue"></div>
                        <div class="color-swatch" style="background:#10b981" data-color="#10b981" onclick="setThemeColor('#10b981', this)" title="Emerald"></div>
                        <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b" onclick="setThemeColor('#f59e0b', this)" title="Amber"></div>
                        <div class="color-swatch" style="background:#ef4444" data-color="#ef4444" onclick="setThemeColor('#ef4444', this)" title="Red"></div>
                        <div class="color-swatch" style="background:#06b6d4" data-color="#06b6d4" onclick="setThemeColor('#06b6d4', this)" title="Cyan"></div>
                    </div>
                    <div id="custom-color-row">
                        <input type="color" id="custom-color-input" value="#7c3aed" oninput="setThemeColor(this.value, null)" title="Custom color">
                        <span id="custom-color-label">Custom color</span>
                    </div>
                </div>

                <!-- Custom Background -->
                <div class="setting-group">
                    <label>Chat Background</label>
                    <div class="bg-input-row">
                        <input type="text" id="bg-url-input" placeholder="Paste image URL..." oninput="previewBg(this.value)">
                        <button class="btn-sm-danger" onclick="clearBg()">Clear</button>
                    </div>
                    <div id="bg-preview">Preview</div>
                    <button onclick="applyBg()" style="margin-top:4px;">Apply Background</button>
                </div>
            </div>
            <button class="settings-reset-btn" onclick="resetAllSettings()">🔄 Reset All Settings</button>
        </div>

        <!-- Left Panel: Directory -->
        <div id="left-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h3 style="margin-bottom: 0;">Active Rooms</h3>
                <button onclick="toggleMenu(false)"
                    style="width: auto; background: none; color: var(--text-muted); font-size: 1.5rem; padding: 0;">&times;</button>
            </div>
            <div id="room-directory">
                <ul id="room-list"></ul>
            </div>
        </div>

        <!-- Right Panel: Main Content -->
        <div id="right-panel">
            <div class="header-bar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="menu-toggle" onclick="toggleMenu(true)" title="Rooms List">☰</button>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img src="icon/icon.jpg" alt="Yaper" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover;">
                        <h2>Yaper</h2>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div id="status-container" style="display: flex; align-items: center; gap: 6px;" title="Connecting...">
                        <div id="status-dot" style="width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); box-shadow: 0 0 5px rgba(0,0,0,0.1);"></div>
                        <span id="status-text" style="color: var(--text-muted); font-size: 14px; font-weight: 600;">Connecting...</span>
                    </div>
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="icon-btn" title="Toggle Dark Mode">🌙</button>
                    <!-- Settings Toggle -->
                    <button id="settings-toggle" class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
                </div>
            </div>

            <!-- Setup UI -->
            <div id="setup">
                <div class="setup-card">
                    <h3>Join a Room</h3>
                    <input id="join_username" type="text" placeholder="Your Name">
                    <input id="join_room" type="text" placeholder="Room Name">
                    <input id="join_password" type="password" placeholder="Password (if private)">
                    <button onclick="joinRoom()">Join Room</button>
                </div>

                <div class="setup-card">
                    <h3>Create a Room</h3>
                    <input id="create_room" type="text" placeholder="New Room Name">
                    <div class="form-row">
                        <label>User Limit (2-50): </label>
                        <input id="create_limit" type="number" min="2" max="50" value="10"
                            style="width: 80px; margin-bottom: 0;">
                    </div>

                    <div class="form-row" style="justify-content: flex-start; gap: 10px;">
                        <input type="checkbox" id="create_is_private"
                            onchange="document.getElementById('create_password').style.display = this.checked ? 'block' : 'none';"
                            style="width: auto;">
                        <label>Make Private</label>
                    </div>
                    <input id="create_password" type="password" placeholder="Set Password"
                        style="display: none; margin-top: 10px;">
                    <button onclick="createRoom()" style="margin-top: 15px;">Create Room</button>
                </div>
            </div>

            <div id="chat">
                <div class="header-bar chat-header"
                    style="border-bottom: 1px solid var(--border-color); margin-bottom: 0; padding: 15px 25px;">
                    <div class="mobile-back-btn" onclick="leaveRoom()" style="display: none;">
                        <span>←</span> Back
                    </div>
                    <h3 id="room-header" style="margin: 0; font-size: 1.4rem;"></h3>
                    <button onclick="leaveRoom()" class="danger pc-only-btn"
                        style="width: auto; padding: 6px 12px; font-size: 0.9rem;">Leave Room</button>
                </div>

                <div class="chat-container">
                    <div class="chat-main">
                        <div id="messages"></div>
                        <div class="input-area">
                            <div id="typing_indicator"></div>
                            <div class="input-row">
                                <input id="my_message" type="text" placeholder="Type a message..." autocomplete="off"
                                    onkeypress="if(event.key === 'Enter') sendMessage()">

                                <div style="position: relative;">
                                    <div class="emoji-btn" id="emoji-toggle">😀</div>
                                    <div id="emoji-picker-container"
                                        style="display: none; position: absolute; bottom: 100%; right: 0; margin-bottom: 10px; z-index: 1000; box-shadow: var(--shadow); border-radius: var(--radius);">
                                        <emoji-picker class="dark"
                                            style="--background: var(--panel-bg); --border-color: var(--border-color);"></emoji-picker>
                                    </div>
                                </div>

                                <div class="file-upload">
                                    <div class="file-upload-btn" id="upload-btn">📷</div>
                                    <input type="file" id="image_input" accept="image/*"
                                        onchange="if(this.files.length > 0) { document.getElementById('upload-btn').classList.add('has-file'); document.getElementById('upload-btn').innerText = '🖼️ ✓'; } else { document.getElementById('upload-btn').classList.remove('has-file'); document.getElementById('upload-btn').innerText = '📷'; }">
                                </div>
                                <button onclick="sendMessage()">Send</button>
                            </div>
                        </div>
                    </div>

                    <div class="roster-sidebar">
                        <h4>Users Online</h4>
                        <ul id="roster"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // When deploying to Netlify, replace this with your actual Render URL.
        const RENDER_URL = 'https://new-chat-website-tuhy.onrender.com'; 
        
        const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : RENDER_URL;

        var socket = io(BACKEND_URL, { 
            transports: ['websocket', 'polling'],
            withCredentials: true
        });
        var username, room;

        // Dark Mode Logic
        const themeBtn = document.getElementById('theme-toggle');
        const picker = document.querySelector('emoji-picker');

        function updateBgGradient(color, isDark) {
            let r=parseInt(color.substr(1,2),16), g=parseInt(color.substr(3,2),16), b=parseInt(color.substr(5,2),16);
            if (isDark) {
                document.body.style.setProperty('--bg-gradient', `linear-gradient(135deg, rgba(${r},${g},${b},0.15) 0%, #0f172a 100%)`);
            } else {
                document.body.style.setProperty('--bg-gradient', `linear-gradient(135deg, rgba(${r},${g},${b},0.12) 0%, rgba(${r},${g},${b},0.03) 100%)`);
            }
        }

        function applyTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
                themeBtn.innerText = '☀️';
                picker.classList.add('dark');
            } else {
                document.body.classList.remove('dark-mode');
                themeBtn.innerText = '🌙';
                picker.classList.remove('dark');
            }
            const currentColor = localStorage.getItem('yaper_theme_color') || '#7c3aed';
            updateBgGradient(currentColor, isDark);
        }

        if (localStorage.getItem('theme') === 'dark') {
            applyTheme(true);
        }

        themeBtn.onclick = () => {
            const isDark = !document.body.classList.contains('dark-mode');
            applyTheme(isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        // Emoji Logic
        const emojiToggle = document.getElementById('emoji-toggle');
        const emojiContainer = document.getElementById('emoji-picker-container');
        const messageInput = document.getElementById('my_message');

        emojiToggle.onclick = (e) => {
            e.stopPropagation();
            emojiContainer.style.display = emojiContainer.style.display === 'none' ? 'block' : 'none';
        };

        document.addEventListener('click', (e) => {
            if (!emojiContainer.contains(e.target) && e.target !== emojiToggle) {
                emojiContainer.style.display = 'none';
            }
        });

        picker.addEventListener('emoji-click', event => {
            messageInput.value += event.detail.unicode;
            messageInput.focus();
        });

        function previewImage(url) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            lb.style.display = 'flex';
        }

        // Socket Logic
        socket.on('connect', function () {
            var st = document.getElementById('status-text');
            var sd = document.getElementById('status-dot');
            var sc = document.getElementById('status-container');
            if (st) { st.innerText = "Connected"; st.style.color = "#28a745"; }
            if (sd) { sd.style.background = "#28a745"; }
            if (sc) { sc.title = "Connected"; }

            if (username && room) {
                var password = document.getElementById('join_password') ? document.getElementById('join_password').value : '';
                socket.emit('join', { username: username, room: room, password: password, color: userColor });
            }
        });

        socket.on('disconnect', function () {
            var st = document.getElementById('status-text');
            var sd = document.getElementById('status-dot');
            var sc = document.getElementById('status-container');
            if (st) { st.innerText = "Reconnecting..."; st.style.color = "var(--danger)"; }
            if (sd) { sd.style.background = "var(--danger)"; }
            if (sc) { sc.title = "Reconnecting..."; }
        });

        socket.on('join_error', function (data) {
            alert(data.error);
            document.getElementById('chat').style.display = 'none';
            document.getElementById('setup').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
        });

        socket.on('create_error', function (data) {
            alert(data.error);
        });

        socket.on('create_success', function (data) {
            alert("Room '" + data.room + "' created! You can now join it.");
            document.getElementById('join_room').value = data.room;
            if (document.getElementById('create_is_private').checked) {
                document.getElementById('join_password').value = document.getElementById('create_password').value;
            }
            document.getElementById('create_room').value = '';
            document.getElementById('create_password').value = '';
        });

        function createRoom() {
            var r = document.getElementById('create_room').value;
            var limit = document.getElementById('create_limit').value;
            var isPrivate = document.getElementById('create_is_private').checked;
            var password = document.getElementById('create_password').value;
            if (!r) return alert("Room name is required.");
            socket.emit('create_room', { room: r, limit: limit, is_private: isPrivate, password: password });
        }

        var userColor;
        var notifySound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        var typingTimeout;

        document.getElementById('my_message').addEventListener('input', function () {
            socket.emit('typing', { is_typing: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function () {
                socket.emit('typing', { is_typing: false });
            }, 1500);
        });

        socket.on('typing', function (data) {
            var typDiv = document.getElementById('typing_indicator');
            if (data.is_typing) {
                typDiv.innerText = data.user + " is typing...";
            } else {
                typDiv.innerText = "";
            }
        });

        socket.on('message_status_update', function (data) {
            var msgEl = document.querySelector(`[data-id="${data.msg_id}"]`);
            if (msgEl) {
                var seenDiv = msgEl.querySelector('.seen-status');
                if (seenDiv) {
                    var ownUsername = username;
                    var otherSeen = data.seen_by.filter(u => u !== ownUsername);
                    if (otherSeen.length > 0) {
                        seenDiv.innerHTML = `<span class="seen-icon">✓✓</span> Seen`;
                        seenDiv.title = "Seen by: " + otherSeen.join(", ");
                    }
                }
            }
        });

        socket.on('room_users', function (users) {
            var roster = document.getElementById('roster');
            if (!roster) return;
            roster.innerHTML = '';
            users.forEach(function (u) {
                var li = document.createElement('li');
                li.style.cursor = 'pointer';
                li.onclick = () => insertMention(u.name);
                li.innerHTML = `<span class="dot" style="background-color: ${u.color}"></span> <span>${u.name}</span>`;
                roster.appendChild(li);
            });
        });

        function insertMention(name) {
            const input = document.getElementById('my_message');
            input.value += (input.value ? ' ' : '') + name + '___ ';
            input.focus();
        }

        function joinRoom() {
            username = document.getElementById('join_username').value.trim();
            room = document.getElementById('join_room').value.trim();
            var password = document.getElementById('join_password').value;

            if (username && room) {
                // Save to session storage for persistence
                sessionStorage.setItem('username', username);
                sessionStorage.setItem('room', room);
                sessionStorage.setItem('password', password);

                socket.emit('join', { username: username, room: room, password: password });
            } else {
                alert("Please enter a name and a room!");
            }
        }

        function leaveRoom() {
            socket.emit('leave', { username: username, room: room });
            document.body.classList.remove('in-chat');
            document.getElementById('chat').style.display = 'none';
            document.getElementById('setup').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';

            // Clear session storage
            sessionStorage.removeItem('username');
            sessionStorage.removeItem('room');
            sessionStorage.removeItem('password');
            sessionStorage.removeItem('userColor');

            // Clear localized variables
            username = null;
            room = null;
        }

        function sendMessage() {
            var msgInput = document.getElementById('my_message');
            var fileInput = document.getElementById('image_input');
            var file = fileInput.files[0];
            var msg = msgInput.value;

            // Handle Image
            if (file) {
                var reader = new FileReader();
                reader.onload = function (evt) {
                    socket.emit('message', {
                        msg: evt.target.result,
                        room: room,
                        username: username,
                        type: 'image'
                    });
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
                document.getElementById('upload-btn').classList.remove('has-file');
                document.getElementById('upload-btn').innerText = '📷';
            }

            // Handle Text
            if (msg.trim() !== "") {
                socket.emit('message', {
                    msg: msg,
                    room: room,
                    username: username,
                    type: 'text'
                });
                msgInput.value = '';
                emojiContainer.style.display = 'none';
            }
        }

        function scrollToBottom() {
            var messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function appendMessage(data) {
            var messagesDiv = document.getElementById('messages');
            var isOwn = data.user === username;
            // ts moved down to handle it better in the else block

            if (typeof data === 'string') {
                var d = document.createElement('div');
                d.className = 'system-msg';
                d.innerText = data;
                messagesDiv.appendChild(d);
            } else {
                var d = document.createElement('div');
                d.className = `msg-container ${isOwn ? 'msg-own' : 'msg-other'}`;

                var c = data.color || '#000000';
                if (document.body.classList.contains('dark-mode') && c === '#000000') {
                    c = '#e0e0e0'; // Adjust default black to white in dark mode
                }

                var ts = "";
                if (data.timestamp) {
                    ts = data.timestamp.includes(' ') ? data.timestamp.split(' ')[1] : data.timestamp;
                }

                var deleteBtnHTML = isOwn && data.id ? `<span class="delete-msg-btn" onclick="deleteMessage('${data.id}')" title="Delete Message">🗑️</span>` : '';

                var headerHTML = `<div class="msg-header">
                                    <span class="msg-name" style="color: ${c}; cursor: pointer;" onclick="insertMention('${data.user}')">${data.user}</span>
                                    ${ts ? `<span class="msg-time">${ts}</span>` : ''}
                                    ${deleteBtnHTML}
                                  </div>`;

                var bubbleHTML = '';
                var isImage = data.type === 'image' || (typeof data.msg === 'string' && data.msg.startsWith('data:image'));
                
                if (isImage) {
                    bubbleHTML = `<div class="msg-bubble" style="padding: 10px; position: relative;">
                        <img src="${data.msg}" class="chat-image" onclick="previewImage('${data.msg}')" onload="scrollToBottom()">
                        <a href="${data.msg}" download="received_image.png" class="download-btn-overlay" title="Download Image">⬇️</a>
                    </div>`;
                } else {
                    var urlRegex = /(https?:\/\/[^\s]+)/g;
                    var safeMsg = data.msg.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    // Highlight mentions in text
                    var lowerMsg = data.msg.toLowerCase();
                    var myLowerName = (username || "").toLowerCase();
                    var hasMention = myLowerName && lowerMsg.includes(myLowerName + "___");

                    if (hasMention) {
                        d.classList.add('msg-mention');
                    }

                    var formattedText = safeMsg.replace(urlRegex, function (url) {
                        return '<a href="' + url + '" target="_blank" style="color: inherit; text-decoration: underline; font-weight: 500;">' + url + '</a>';
                    });

                    // Color the mention tag specifically
                    formattedText = formattedText.replace(/(\S+___)/g, '<span class="mention-tag">$1</span>');

                    bubbleHTML = `<div class="msg-bubble">
                                    ${data.is_forwarded ? `<span class="forwarded-tag">Forwarded by ${data.forwarded_from}</span>` : ''}
                                    ${formattedText}
                                  </div>`;
                }

                d.innerHTML = headerHTML + bubbleHTML;

                // Add seen status container
                var seenDiv = document.createElement('div');
                seenDiv.className = 'seen-status';

                if (isOwn) {
                    var otherSeen = (data.seen_by || []).filter(u => u !== username);
                    if (otherSeen.length > 0) {
                        seenDiv.innerHTML = `<span class="seen-icon">✓✓</span> Seen`;
                        seenDiv.title = "Seen by: " + otherSeen.join(", ");
                    } else {
                        seenDiv.innerHTML = `<span class="seen-icon">✓</span> Sent`;
                    }
                    d.appendChild(seenDiv);
                }

                d.setAttribute('data-id', data.id);
                messagesDiv.appendChild(d);

                // Mark as read if it's from someone else and we see it
                if (!isOwn && data.id) {
                    messageObserver.observe(d);
                }
            }
            scrollToBottom();
        }

        // Intersection Observer for Seen feature
        const messageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const msgId = entry.target.getAttribute('data-id');
                    if (msgId) {
                        socket.emit('mark_read', { msg_id: msgId });
                        messageObserver.unobserve(entry.target);
                    }
                }
            });
        }, { threshold: 0.5 });

        socket.on('message', function (data) {
            appendMessage(data);
            const myLowerName = (username || "").toLowerCase();
            const isMention = myLowerName && data.type === 'text' && data.msg && typeof data.msg === 'string' && data.msg.toLowerCase().includes(myLowerName + "___");
            if (data.user && (data.user !== username || isMention)) {
                notifySound.play().catch(function (e) { });
            }
        });

        function deleteMessage(msgId) {
            if (confirm("Are you sure you want to delete this message?")) {
                socket.emit('delete_message', { msg_id: msgId });
            }
        }

        socket.on('message_deleted', function(data) {
            var msgEl = document.querySelector(`[data-id="${data.msg_id}"]`);
            if (msgEl) {
                // Add a cute animation before removing
                msgEl.style.transition = "all 0.3s ease";
                msgEl.style.opacity = "0";
                msgEl.style.transform = "scale(0.9)";
                setTimeout(() => {
                    msgEl.remove();
                }, 300);
            }
        });

        socket.on('chat_history', function (history) {
            document.body.classList.add('in-chat');
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            document.getElementById('room-header').innerText = room;

            document.getElementById('messages').innerHTML = '';
            history.forEach(function (msgData) {
                appendMessage(msgData);
            });
        });

        function toggleMenu(show) {
            const panel = document.getElementById('left-panel');
            const overlay = document.getElementById('menu-overlay');
            if (show) {
                panel.classList.add('open');
                overlay.style.display = 'block';
            } else {
                panel.classList.remove('open');
                overlay.style.display = 'none';
            }
        }

        socket.on('room_list', function (rooms) {
            var listElement = document.getElementById('room-list');
            if (!listElement) return;

            listElement.innerHTML = '';
            if (rooms.length === 0) {
                listElement.innerHTML = '<li style="padding: 10px; color: var(--text-muted); font-size: 0.9rem;">No active rooms</li>';
            }

            rooms.forEach(function (roomObj) {
                var li = document.createElement('li');
                li.className = 'room-item';
                li.innerHTML = (roomObj.private ? "🔒 " : "💬 ") + roomObj.name;
                li.onclick = function () {
                    document.getElementById('join_room').value = roomObj.name;
                    document.getElementById('join_password').value = '';
                    if (roomObj.private) document.getElementById('join_password').focus();
                    toggleMenu(false); // Close menu after choice
                };
                listElement.appendChild(li);
            });
        });

        // Auto-restore session from sessionStorage
        window.onload = function () {
            const storedUser = sessionStorage.getItem('username');
            const storedRoom = sessionStorage.getItem('room');
            const storedPass = sessionStorage.getItem('password');

            if (storedUser && storedRoom) {
                document.getElementById('join_username').value = storedUser;
                document.getElementById('join_room').value = storedRoom;
                document.getElementById('join_password').value = storedPass || '';

                // Set localized variables
                username = storedUser;
                room = storedRoom;

                // Add a small delay to ensure room list is received first
                setTimeout(() => {
                    if (username && room) {
                        joinRoom();
                    }
                }, 500);
            }
        };
    </script>
    <div id="lightbox" onclick="this.style.display='none'">
        <div class="lightbox-close">&times;</div>
        <img id="lightbox-img" src="" alt="Preview">
    </div>

    <script>
        let activeRoomsCache = [];

        socket.on('room_list', function (rooms) {
            activeRoomsCache = rooms;
        });

        // --- SETTINGS LOGIC ---
        const settingsPanel = document.getElementById('settings-panel');
        const settingsOverlay = document.getElementById('settings-overlay');

        function openSettings() {
            settingsPanel.classList.add('open');
            settingsOverlay.style.display = 'block';
        }

        function closeSettings() {
            settingsPanel.classList.remove('open');
            settingsOverlay.style.display = 'none';
        }

        // Font Size
        function setFontSize(size) {
            document.body.style.fontSize = size + 'px';
            document.getElementById('font-size-slider').value = size;
            document.getElementById('font-size-val').innerText = size + 'px';
            localStorage.setItem('yaper_font_size', size);
        }

        // Theme Color
        function setThemeColor(color, btnElement) {
            document.body.style.setProperty('--primary', color);
            document.body.style.setProperty('--msg-bg-own', color);
            
            // Generate a darker hover color
            let r=parseInt(color.substr(1,2),16), g=parseInt(color.substr(3,2),16), b=parseInt(color.substr(5,2),16);
            r=Math.max(0,r-20); g=Math.max(0,g-20); b=Math.max(0,b-20);
            document.body.style.setProperty('--primary-hover', `rgb(${r},${g},${b})`);

            // Update background tint
            updateBgGradient(color, document.body.classList.contains('dark-mode'));

            document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            document.getElementById('custom-color-input').value = color; // sync picker
            localStorage.setItem('yaper_theme_color', color);
        }

        // Background Image
        function previewBg(url) {
            const preview = document.getElementById('bg-preview');
            if (url) {
                preview.style.backgroundImage = `url('${url}')`;
                preview.innerText = '';
            } else {
                preview.style.backgroundImage = 'none';
                preview.innerText = 'Preview';
            }
        }

        function clearBg() {
            document.getElementById('bg-url-input').value = '';
            previewBg('');
            applyBg();
        }

        function applyBg() {
            const url = document.getElementById('bg-url-input').value;
            if (url) {
                document.body.style.backgroundImage = `url('${url}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.classList.add('custom-bg-active');
                localStorage.setItem('yaper_bg_url', url);
            } else {
                document.body.style.backgroundImage = 'var(--bg-gradient)';
                document.body.classList.remove('custom-bg-active');
                localStorage.removeItem('yaper_bg_url');
            }
        }

        function resetAllSettings() {
            if (confirm('Are you sure you want to reset all settings to default?')) {
                localStorage.removeItem('yaper_font_size');
                localStorage.removeItem('yaper_theme_color');
                localStorage.removeItem('yaper_bg_url');
                
                // Defaults
                setFontSize(16);
                setThemeColor('#7c3aed', document.querySelector('.color-swatch[data-color="#7c3aed"]'));
                clearBg();
            }
        }

        // Load Settings on Boot
        function loadSettings() {
            const savedSize = localStorage.getItem('yaper_font_size');
            const savedColor = localStorage.getItem('yaper_theme_color');
            const savedBg = localStorage.getItem('yaper_bg_url');

            if (savedSize) {
                setFontSize(savedSize);
            } else {
                setFontSize(16);
            }

            if (savedColor) {
                const btn = document.querySelector(`.color-swatch[data-color="${savedColor}"]`);
                setThemeColor(savedColor, btn);
            } else {
                document.querySelector('.color-swatch[data-color="#7c3aed"]').classList.add('active');
                updateBgGradient('#7c3aed', document.body.classList.contains('dark-mode'));
            }

            if (savedBg) {
                document.getElementById('bg-url-input').value = savedBg;
                previewBg(savedBg);
                applyBg();
            }
        }

        // Initialize settings immediately
        loadSettings();
    </script>
</body>
